<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1a1a;--surface:#2f2f2f;--surface2:#3a3a3a;--border:#4a4a4a;
  --text:#e8e4de;--text2:#9a9590;--accent:#c9a96e;--input-bg:#2a2a2a;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh}

.chat-area{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.welcome{text-align:center;padding:40px 20px}
.greeting{font-size:28px;font-weight:300;color:var(--text2);margin-bottom:4px}
.greeting .spark{color:var(--accent);margin-right:4px}
.username{font-style:italic;color:var(--text)}

.msg{margin:8px 0;max-width:85%;animation:fadeIn .2s}
.msg.user{margin-left:auto}
.msg .bubble{padding:12px 16px;border-radius:16px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:var(--surface2);border-bottom-right-radius:4px}
.msg.bot .bubble{background:transparent;padding:0 0 8px 0}
.msg.bot .bubble .cursor{display:inline-block;width:2px;height:1em;background:var(--accent);animation:blink .6s infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.typing-indicator{display:flex;gap:4px;padding:12px 0}
.typing-indicator span{width:6px;height:6px;background:var(--text2);border-radius:50%;animation:dot 1.2s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

.input-area{padding:8px 12px 12px;background:var(--bg)}
.input-wrapper{display:flex;align-items:flex-end;background:var(--surface);border-radius:16px;padding:4px;border:1px solid var(--border);transition:border-color .2s}
.input-wrapper:focus-within{border-color:var(--accent)}

.model-select{display:flex;align-items:center;padding:8px 12px;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;user-select:none}
.model-select::after{content:'';border:4px solid transparent;border-top-color:var(--text2);margin-left:6px;margin-top:2px}

textarea{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;padding:8px 12px;resize:none;outline:none;font-family:inherit;line-height:1.4;max-height:120px;min-height:24px}
textarea::placeholder{color:var(--text2)}

.send-btn{width:36px;height:36px;border:none;background:var(--accent);color:var(--bg);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s;margin-bottom:1px}
.send-btn:disabled{opacity:.3;cursor:default}
.send-btn svg{width:18px;height:18px}

.quick-actions{display:flex;gap:8px;padding:8px 12px;overflow-x:auto;justify-content:center;flex-wrap:wrap}
.quick-actions::-webkit-scrollbar{display:none}
.quick-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s;user-select:none}
.quick-btn:active{background:var(--surface2);border-color:var(--accent);color:var(--text)}

.model-dropdown{position:fixed;bottom:80px;left:12px;right:12px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:8px;display:none;z-index:10;max-height:50vh;overflow-y:auto}
.model-dropdown.show{display:block}
.model-option{padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;transition:background .15s}
.model-option:active,.model-option.active{background:var(--surface2)}
.model-option .tier{font-size:11px;color:var(--text2);margin-left:6px}

@media(max-width:480px){
  .greeting{font-size:24px}
  .msg{max-width:92%}
}
</style>
</head>
<body>
<div id="app">
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="greeting"><span class="spark>&#10022;</span> <span id="greetText"></span>, <span class="username" id="userName"></span></div>
    </div>
  </div>

  <div class="quick-actions" id="quickActions">
    <button class="quick-btn" data-prompt="Write a short story about">&#9998; Write</button>
    <button class="quick-btn" data-prompt="Explain like I'm 5:">&#128218; Learn</button>
    <button class="quick-btn" data-prompt="Write code for:">&#60;/&#62; Code</button>
    <button class="quick-btn" data-prompt="Help me with:">&#9749; Life stuff</button>
    <button class="quick-btn" data-prompt="Give me a random interesting fact about">&#128161; Random</button>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <div class="model-select" id="modelSelect" onclick="toggleModelDropdown()"></div>
      <textarea id="input" rows="1" placeholder="How can I help you today?" oninput="autoResize()" onkeydown="onKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="model-dropdown" id="modelDropdown"></div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const API='';
const TGM=Telegram.WebApp;
TGM.ready();TGM.expand();

let models=[],selectedModel='gateway-gpt-5-nano',history=[];
const userName=TGM.initDataUnsafe?.user?.first_name||'there';

function init(){
  const h=new Date().getHours();
  const greet=h<12?'Morning':h<18?'Afternoon':'Evening';
  document.getElementById('greetText').textContent=greet;
  document.getElementById('userName').textContent=userName;
  document.getElementById('modelSelect').textContent=selectedModel;
  fetchModels();
}

async function fetchModels(){
  try{
    const r=await fetch('/api/models');
    const d=await r.json();
    models=(d.data||[]).filter(m=>m.available!==false);
    models.sort((a,b)=>(a.provider||'').localeCompare(b.provider||'')||(a.name||'').localeCompare(b.name||''));
    renderModelDropdown();
  }catch(e){console.error(e)}
}

function renderModelDropdown(){
  const dd=document.getElementById('modelDropdown');
  dd.innerHTML=models.map(m=>`<div class="model-option${m.id===selectedModel?' active':''}" onclick="selectModel('${m.id}')">${m.name}<span class="tier">${m.tier||''}</span></div>`).join('');
}

function toggleModelDropdown(){
  document.getElementById('modelDropdown').classList.toggle('show');
}

function selectModel(id){
  selectedModel=id;
  document.getElementById('modelSelect').textContent=id;
  document.getElementById('modelDropdown').classList.remove('show');
  renderModelDropdown();
}

function autoResize(){
  const el=document.getElementById('input');
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
  document.getElementById('sendBtn').disabled=!el.value.trim();
}

function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function md(s){
  let h=esc(s);
  h=h.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  h=h.replace(/__(.+?)__/g,'<b>$1</b>');
  h=h.replace(/\*(.+?)\*/g,'<i>$1</i>');
  h=h.replace(/_(.+?)_/g,'<i>$1</i>');
  h=h.replace(/~~(.+?)~~/g,'<s>$1</s>');
  return h;
}

function addMsg(role,text){
  const area=document.getElementById('chatArea');
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.remove();
  document.getElementById('quickActions').style.display='none';
  const div=document.createElement('div');
  div.className='msg '+role;
  div.innerHTML=`<div class="bubble">${role==='bot'?md(text):esc(text)}</div>`;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
  return div;
}

function addTyping(){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='msg bot';
  div.id='typing';
  div.innerHTML=`<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
  return div;
}

function removeTyping(){document.getElementById('typing')?.remove()}

async function send(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';autoResize();

  addMsg('user',text);
  history.push({role:'user',content:text});

  const typing=addTyping();

  let packed=buildPack(text);
  let buffer='';
  let errored='';

  try{
    const r=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:packed,model:selectedModel,effort:'medium'})
    });
    if(!r.ok){errored='HTTP '+r.status;return}
    const reader=r.body.getReader();
    const decoder=new TextDecoder();
    let first=true;

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      const chunk=decoder.decode(value,{stream:true});
      for(const line of chunk.split('\n')){
        if(!line.startsWith('data:'))continue;
        const payload=line.slice(5).trim();
        if(!payload)continue;
        try{
          const obj=JSON.parse(payload);
          if(obj.error){errored=obj.error;break}
          if(obj.delta){
            if(first){removeTyping();first=false}
            buffer+=obj.delta;
            typing.innerHTML=`<div class="bubble">${md(buffer)}<span class="cursor"></span></div>`;
            document.getElementById('chatArea').scrollTop=document.getElementById('chatArea').scrollHeight;
          }
        }catch(e){}
      }
    }
  }catch(e){errored=e.message}

  removeTyping();
  if(buffer.trim()){
    addMsg('bot',buffer);
    history.push({role:'assistant',content:buffer});
  }else if(errored){
    addMsg('bot','Error: '+errored);
  }
  document.getElementById('sendBtn').disabled=true;
}

function buildPack(text){
  if(!history.length)return text;
  let p='';
  for(const t of history){
    p+=(t.role==='user'?'USER: ':'ASSISTANT: ')+t.content+'\n\n';
  }
  p+='USER: '+text+'\n\nASSISTANT:';
  return p;
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.model-dropdown')&&!e.target.closest('.model-select')){
    document.getElementById('modelDropdown').classList.remove('show');
  }
});

document.querySelectorAll('.quick-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const prompt=btn.dataset.prompt;
    document.getElementById('input').value=prompt+' ';
    autoResize();
    document.getElementById('input').focus();
  });
});

TGM.MainButton?.setParams?.({is_active:true});

init();
</script>
</body>
</html>
